<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数字经济下绿色供应链管理 | 章节资源页</title>
    <meta
      name="description"
      content="教材章节资源详情页，包含视频、音频、作业试题、拓展阅读与章节小节导航。"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">教材资源门户 · 章节资源页</p>
          <h1>数字经济下绿色供应链管理</h1>
          <h2>章节内容与资源导航</h2>
          <p class="lede">
            按教材目录拆分的章节资源页，点击章节后进入本页查看视频、章节小节、相关说明与后续扩展资源。
          </p>

          <div class="hero-actions">
            <a class="button button-primary" href="./index.html">返回门户首页</a>
            <a class="button button-secondary" id="resource-base-link" href="#" target="_blank" rel="noreferrer">
              打开资源仓库
            </a>
          </div>

          <div class="hero-meta">
            <div>
              <span class="meta-label">章节总数</span>
              <strong id="chapter-count">11</strong>
            </div>
            <div>
              <span class="meta-label">资源入口</span>
              <strong>GitHub Pages</strong>
            </div>
            <div>
              <span class="meta-label">内容类型</span>
              <strong>视频 / 试题 / 阅读</strong>
            </div>
          </div>
        </div>
      </header>

      <section class="resource-block" aria-label="资源类型说明">
        <article>
          <h3>视频资源</h3>
          <p>章节视频、微课、案例讲解与专题导读统一收纳，适合扫码直达。</p>
        </article>
        <article>
          <h3>题库资源</h3>
          <p>章节作业、测试题、期末综合题按章节提供，便于课后复习。</p>
        </article>
        <article>
          <h3>拓展阅读</h3>
          <p>按政策、标准、行业案例和文献资料组织，支持教学延伸。</p>
        </article>
        <article>
          <h3>章节索引</h3>
          <p>点击“返回门户首页”可回到目录总览，继续切换其他章节。</p>
        </article>
      </section>

      <main>
        <section class="controls" aria-label="章节筛选">
          <label class="search">
            <span>搜索章节或小节</span>
            <input id="search-input" type="search" placeholder="例如：绿色采购、库存管理、风险控制" />
          </label>

          <div class="part-tabs" id="part-tabs" role="tablist" aria-label="分编切换"></div>
        </section>

        <section id="chapters" class="chapters" aria-live="polite"></section>
      </main>
    </div>
  </body>
</html>
