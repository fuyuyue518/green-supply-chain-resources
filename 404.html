<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="2; url=./index.html" />
    <title>页面未找到 | 数字经济下绿色供应链管理</title>
    <style>
      :root {
        --bg: #f3efe7;
        --text: #173227;
        --muted: #5d6762;
        --accent: #1f6b4e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(31, 107, 78, 0.16), transparent 28%),
          linear-gradient(180deg, #faf7f0 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
      }
      .card {
        width: min(680px, calc(100vw - 32px));
        padding: 36px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(23, 50, 39, 0.12);
        box-shadow: 0 18px 55px rgba(22, 35, 29, 0.12);
      }
      .kicker {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 0.9rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        font-family: "Noto Serif SC", "Songti SC", serif;
        font-size: clamp(2rem, 5vw, 3.6rem);
        line-height: 1.05;
      }
      p {
        margin: 14px 0 0;
        color: var(--muted);
        line-height: 1.8;
        font-size: 1rem;
      }
      a {
        color: var(--accent);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="kicker">GitHub Pages</p>
      <h1>页面未找到</h1>
      <p>
        你访问的路径不存在，2 秒后会自动返回教材首页。
        如果没有自动跳转，也可以直接点击
        <a href="./index.html">返回首页</a>。
      </p>
    </main>
  </body>
</html>
